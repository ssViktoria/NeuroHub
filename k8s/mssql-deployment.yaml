# Secret для пароля SQL Server
apiVersion: v1
kind: Secret
metadata:
  name: mssql-secret
type: Opaque
data:
  # Пароль: SuperSecretPass123! (закодований в base64)
  SA_PASSWORD: U3VwZXJTZWNyZXRQYXNzMTIzIQ==
---
# Deployment для SQL Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mssql-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mssql
  template:
    metadata:
      labels:
        app: mssql
    spec:
      containers:
      - name: mssql
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
        - containerPort: 1433
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql-secret
              key: SA_PASSWORD
        - name: MSSQL_PID
          value: "Express"
---
# Service для доступу до БД всередині кластера
apiVersion: v1
kind: Service
metadata:
  name: mssql-service
spec:
  selector:
    app: mssql
  ports:
  - port: 1433
    targetPort: 1433
  type: ClusterIP